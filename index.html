<!doctype html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SocialNet Manager</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
    crossorigin="anonymous"
  />

  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <header id="app-header" class="shadow-sm">
    <div class="container-fluid py-3">
      <h1 id="app-title" class="mb-0">LBYCPG3 SocialNet App - Profile Manager</h1>
    </div>
  </header>

  <div id="app-wrapper">
    <main class="container-fluid py-3 flex-grow-1">
      <div class="row g-3 h-100">
        <!-- LEFT PANEL -->
        <div class="col-12 col-md-3">
          <div class="sn-panel h-100">
            <h6 class="fw-bold text-primary border-bottom pb-2 mb-3">Profile Management</h6>

            <label for="input-name" class="form-label fw-semibold small">Profile Name</label>
            <div class="input-group mb-2">
              <input
                type="text"
                id="input-name"
                class="form-control form-control-sm"
                placeholder="Enter full name"
              />
              <button id="btn-add" class="btn btn-primary btn-sm" type="button">Add</button>
            </div>

            <div class="d-grid gap-2 mb-3">
              <button id="btn-lookup" class="btn btn-outline-primary btn-sm" type="button">
                Look Up Profile
              </button>
              <button id="btn-delete" class="btn btn-danger btn-sm" type="button">
                Delete Selected Profile
              </button>
            </div>

            <p class="small fw-semibold text-muted mb-2">Profiles</p>
            <div id="profile-list" class="profile-list-box"></div>
          </div>
        </div>

        <!-- CENTER PANEL -->
        <div class="col-12 col-md-5">
          <div class="sn-panel h-100 text-center">
            <h6 class="fw-bold text-primary border-bottom pb-2 mb-3">Profile Information</h6>

            <img
              id="profile-pic"
              src="resources/images/default.png"
              alt="Profile picture"
              class="profile-thumb mb-3"
            />

            <h4 id="profile-name" class="profile-hero-name">No Profile Selected</h4>

            <p class="small fw-semibold text-start text-muted mb-1">Current Status</p>
            <div id="profile-status" class="sn-textbox mb-3">—</div>

            <p class="small fw-semibold text-start text-muted mb-1">Favorite Quote</p>
            <div id="profile-quote" class="sn-textbox mb-3">—</div>

            <p class="small fw-semibold text-start text-muted mb-1">Friends</p>
            <div id="friends-list" class="sn-textbox sn-textbox--tall text-start">
              No friends to display.
            </div>
          </div>
        </div>

        <!-- RIGHT PANEL -->
        <div class="col-12 col-md-4">
          <div class="sn-panel h-100">
            <h6 class="fw-bold text-primary border-bottom pb-2 mb-3">Edit Profile</h6>

            <label for="input-status" class="form-label fw-semibold small">Change Status</label>
            <div class="input-group mb-3">
              <input
                type="text"
                id="input-status"
                class="form-control form-control-sm"
                placeholder="New status message"
              />
              <button id="btn-status" class="btn btn-primary btn-sm" type="button">Change</button>
            </div>

            <label for="input-quote" class="form-label fw-semibold small">Change Quote</label>
            <div class="input-group mb-3">
              <input
                type="text"
                id="input-quote"
                class="form-control form-control-sm"
                placeholder="New favorite quote"
              />
              <button id="btn-quote" class="btn btn-primary btn-sm" type="button">Change</button>
            </div>

            <label for="input-picture" class="form-label fw-semibold small">Change Picture URL / Filename</label>
            <div class="input-group mb-3">
              <input
                type="text"
                id="input-picture"
                class="form-control form-control-sm"
                placeholder="e.g. ada or ada.png or URL"
              />
              <button id="btn-picture" class="btn btn-primary btn-sm" type="button">Update</button>
            </div>

            <label for="input-picture-file" class="form-label fw-semibold small">Upload Picture File</label>
            <div class="input-group mb-3">
              <input
                type="file"
                id="input-picture-file"
                class="form-control form-control-sm"
                accept="image/*"
              />
              <button id="btn-upload-picture" class="btn btn-success btn-sm" type="button">
                Upload
              </button>
            </div>

            <label for="input-friend" class="form-label fw-semibold small">Friend Name</label>
            <input
              type="text"
              id="input-friend"
              class="form-control form-control-sm mb-2"
              placeholder="Friend's full name"
            />

            <div class="d-grid gap-2">
              <button id="btn-add-friend" class="btn btn-success btn-sm" type="button">
                Add Friend
              </button>
              <button id="btn-remove-friend" class="btn btn-warning btn-sm" type="button">
                Remove Friend
              </button>
              <button id="btn-exit" class="btn btn-secondary btn-sm" type="button">
                Exit Current Profile
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer id="status-bar">
      <span id="status-message">Ready. Select a profile from the list.</span>
    </footer>
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"
  ></script>
  <script src="js/app.js"></script>
</body>
</html>
